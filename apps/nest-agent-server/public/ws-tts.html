<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>tts</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      .container {
        background: white;
        border-radius: 16px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        width: 100%;
        max-width: 800px;
        overflow: hidden;
      }

      .header {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 24px;
        text-align: center;
      }

      .header h1 {
        font-size: 28px;
        font-weight: 600;
        margin-bottom: 8px;
      }

      .status-bar {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        font-size: 14px;
      }

      .status-indicator {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #ef4444;
        transition: background 0.3s ease;
      }

      .status-indicator.connected {
        background: #10b981;
        box-shadow: 0 0 10px #10b981;
      }

      .content {
        padding: 24px;
      }

      .message-log {
        background: #f9fafb;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        height: 400px;
        overflow-y: auto;
        padding: 16px;
        margin-bottom: 20px;
        scroll-behavior: smooth;
      }

      .message-item {
        margin-bottom: 12px;
        padding: 12px;
        border-radius: 8px;
        animation: slideIn 0.3s ease;
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(-10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .message-sent {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        margin-left: 40px;
      }

      .message-received {
        background: white;
        border: 1px solid #e5e7eb;
        margin-right: 40px;
      }

      .message-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 6px;
        font-size: 12px;
        opacity: 0.8;
      }

      .message-type {
        font-weight: 600;
        text-transform: uppercase;
      }

      .message-time {
        font-family: 'Courier New', monospace;
      }

      .message-content {
        font-size: 14px;
        line-height: 1.5;
        word-break: break-word;
      }

      .audio-player {
        margin-top: 8px;
        padding: 8px;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 6px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .play-btn {
        padding: 6px 12px;
        font-size: 13px;
        font-weight: 500;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.2s ease;
        background: white;
        color: #667eea;
        display: flex;
        align-items: center;
        gap: 4px;
      }

      .play-btn:hover {
        transform: scale(1.05);
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
      }

      .play-btn:active {
        transform: scale(0.98);
      }

      .play-btn.playing {
        background: #fbbf24;
        color: white;
      }

      .audio-info {
        font-size: 12px;
        opacity: 0.9;
      }

      .empty-state {
        text-align: center;
        color: #9ca3af;
        padding: 60px 20px;
        font-size: 14px;
      }

      .input-section {
        display: flex;
        gap: 12px;
      }

      .input-wrapper {
        flex: 1;
        position: relative;
      }

      input[type="text"] {
        width: 100%;
        padding: 14px 18px;
        border: 2px solid #e5e7eb;
        border-radius: 10px;
        font-size: 15px;
        transition: all 0.3s ease;
        outline: none;
      }

      input[type="text"]:focus {
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
      }

      input[type="text"]:disabled {
        background: #f3f4f6;
        cursor: not-allowed;
      }

      button {
        padding: 14px 28px;
        font-size: 15px;
        font-weight: 600;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        transition: all 0.3s ease;
        white-space: nowrap;
      }

      button.primary {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
      }

      button.primary:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
      }

      button.primary:active:not(:disabled) {
        transform: translateY(0);
      }

      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .controls {
        display: flex;
        gap: 10px;
        margin-top: 12px;
      }

      button.secondary {
        background: #f3f4f6;
        color: #374151;
        flex: 1;
      }

      button.secondary:hover:not(:disabled) {
        background: #e5e7eb;
      }

      /* 滚动条样式 */
      .message-log::-webkit-scrollbar {
        width: 8px;
      }

      .message-log::-webkit-scrollbar-track {
        background: #f1f1f1;
        border-radius: 4px;
      }

      .message-log::-webkit-scrollbar-thumb {
        background: #c7c7c7;
        border-radius: 4px;
      }

      .message-log::-webkit-scrollbar-thumb:hover {
        background: #a0a0a0;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>🎙️ tts</h1>
        <div class="status-bar">
          <div class="status-indicator" id="statusIndicator"></div>
          <span id="statusText">未连接</span>
        </div>
      </div>

      <div class="content">
        <div class="message-log" id="messageLog">
          <div class="empty-state">等待消息...</div>
        </div>

        <div class="input-section">
          <div class="input-wrapper">
            <input
              type="text"
              id="messageInput"
              placeholder="输入要发送的消息..."
              disabled
            />
          </div>
          <button type="button" id="sendBtn" class="primary" disabled>发送</button>
        </div>

        <div class="controls">
          <button type="button" id="connectBtn" class="secondary">连接</button>
          <button type="button" id="disconnectBtn" class="secondary" disabled>断开</button>
          <button type="button" id="clearBtn" class="secondary">清空日志</button>
        </div>
      </div>
    </div>

    <script>
      // DOM 元素
      const messageLog = document.getElementById('messageLog');
      const messageInput = document.getElementById('messageInput');
      const sendBtn = document.getElementById('sendBtn');
      const connectBtn = document.getElementById('connectBtn');
      const disconnectBtn = document.getElementById('disconnectBtn');
      const clearBtn = document.getElementById('clearBtn');
      const statusIndicator = document.getElementById('statusIndicator');
      const statusText = document.getElementById('statusText');

      let socket = null;

      // 存储音频数据
      const audioBuffers = new Map();
      let audioCounter = 0;
      // 存储待处理的发送消息
      const pendingMessages = new Map();
      let messageCounter = 0;

      // 获取当前时间
      function getCurrentTime() {
        const now = new Date();
        return now.toLocaleTimeString('zh-CN', {
          hour12: false,
          hour: '2-digit',
          minute: '2-digit',
          second: '2-digit'
        });
      }

      // 将 ArrayBuffer 转换为 Base64
      function arrayBufferToBase64(buffer) {
        let binary = '';
        const bytes = new Uint8Array(buffer);
        const len = bytes.byteLength;
        for (let i = 0; i < len; i++) {
          binary += String.fromCharCode(bytes[i]);
        }
        return window.btoa(binary);
      }

      // 创建音频播放器
      function createAudioPlayer(bufferId, bufferData) {
        const playerDiv = document.createElement('div');
        playerDiv.className = 'audio-player';

        const playBtn = document.createElement('button');
        playBtn.className = 'play-btn';
        playBtn.innerHTML = '▶ 播放';

        const audioInfo = document.createElement('span');
        audioInfo.className = 'audio-info';
        audioInfo.textContent = `音频 #${bufferId}`;

        let audioContext = null;
        let sourceNode = null;
        let isPlaying = false;

        // 解码并播放音频
        async function playAudio() {
          if (isPlaying) {
            // 停止播放
            if (sourceNode) {
              sourceNode.stop();
              sourceNode = null;
            }
            if (audioContext) {
              await audioContext.close();
              audioContext = null;
            }
            playBtn.innerHTML = '▶ 播放';
            playBtn.classList.remove('playing');
            isPlaying = false;
            return;
          }

          try {
            playBtn.innerHTML = '⏸ 停止';
            playBtn.classList.add('playing');
            isPlaying = true;

            // 创建 AudioContext
            audioContext = new (window.AudioContext || window.webkitAudioContext)();

            // 将 buffer 数据转换为 ArrayBuffer
            let arrayBuffer;
            if (bufferData instanceof ArrayBuffer) {
              arrayBuffer = bufferData;
            } else if (bufferData.type === 'Buffer' && Array.isArray(bufferData.data)) {
              // 处理 Node.js Buffer 格式
              arrayBuffer = new Uint8Array(bufferData.data).buffer;
            } else {
              throw new Error('Unsupported buffer format');
            }

            // 解码音频数据
            const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);

            // 创建音频源
            sourceNode = audioContext.createBufferSource();
            sourceNode.buffer = audioBuffer;
            sourceNode.connect(audioContext.destination);

            // 播放完成后的处理
            sourceNode.onended = () => {
              playBtn.innerHTML = '▶ 播放';
              playBtn.classList.remove('playing');
              isPlaying = false;
              if (audioContext) {
                audioContext.close();
                audioContext = null;
              }
            };

            // 开始播放
            sourceNode.start(0);
          } catch (error) {
            console.error('Audio playback error:', error);
            playBtn.innerHTML = '▶ 播放';
            playBtn.classList.remove('playing');
            isPlaying = false;
            audioInfo.textContent = `播放失败: ${error.message}`;
          }
        }

        playBtn.addEventListener('click', playAudio);

        playerDiv.appendChild(playBtn);
        playerDiv.appendChild(audioInfo);

        return playerDiv;
      }

      // 添加消息到日志
      function addMessage(type, content, isAudio = false, bufferData = null, messageId = null) {
        // 移除空状态提示
        const emptyState = messageLog.querySelector('.empty-state');
        if (emptyState) {
          emptyState.remove();
        }

        const messageItem = document.createElement('div');
        messageItem.className = `message-item message-${type}`;

        // 如果有 messageId，设置到 dataset 中便于后续更新
        if (messageId) {
          messageItem.dataset.messageId = messageId;
        }

        const header = document.createElement('div');
        header.className = 'message-header';

        const typeSpan = document.createElement('span');
        typeSpan.className = 'message-type';
        typeSpan.textContent = type === 'sent' ? '发送' : '接收';

        const timeSpan = document.createElement('span');
        timeSpan.className = 'message-time';
        timeSpan.textContent = getCurrentTime();

        header.appendChild(typeSpan);
        header.appendChild(timeSpan);

        const contentDiv = document.createElement('div');
        contentDiv.className = 'message-content';

        if (isAudio && bufferData) {
          // 音频消息
          audioCounter++;
          const bufferId = audioCounter;
          audioBuffers.set(bufferId, bufferData);

          // 添加音频播放器
          const audioPlayer = createAudioPlayer(bufferId, bufferData);
          contentDiv.appendChild(audioPlayer);
        } else {
          // 普通文本消息或加载状态
          contentDiv.textContent = typeof content === 'object' ? JSON.stringify(content, null, 2) : content;
        }

        messageItem.appendChild(header);
        messageItem.appendChild(contentDiv);
        messageLog.appendChild(messageItem);

        // 自动滚动到底部
        messageLog.scrollTop = messageLog.scrollHeight;

        return messageItem;
      }

      // 更新消息为音频播放器
      function updateMessageToAudio(messageId, bufferData) {
        const messageItem = document.querySelector(`[data-message-id="${messageId}"]`);
        if (!messageItem) return;

        const contentDiv = messageItem.querySelector('.message-content');
        if (!contentDiv) return;

        // 清空原有内容
        contentDiv.innerHTML = '';

        // 添加音频数据
        audioCounter++;
        const bufferId = audioCounter;
        audioBuffers.set(bufferId, bufferData);

        // 创建并添加音频播放器
        const audioPlayer = createAudioPlayer(bufferId, bufferData);
        contentDiv.appendChild(audioPlayer);
      }

      // 更新连接状态
      function updateStatus(connected) {
        if (connected) {
          statusIndicator.classList.add('connected');
          statusText.textContent = '已连接';
          messageInput.disabled = false;
          sendBtn.disabled = false;
          connectBtn.disabled = true;
          disconnectBtn.disabled = false;
        } else {
          statusIndicator.classList.remove('connected');
          statusText.textContent = '未连接';
          messageInput.disabled = true;
          sendBtn.disabled = true;
          connectBtn.disabled = false;
          disconnectBtn.disabled = true;
        }
      }

      // 连接 WebSocket
      function connect() {
        if (socket) {
          socket.disconnect();
        }

        // 连接到 /nls namespace
        socket = io('http://192.168.41.17:3000/nls', {
          transports: ['websocket'],
          reconnection: true,
          reconnectionAttempts: 5,
          reconnectionDelay: 1000
        });

        // 连接成功
        socket.on('connect', () => {
          console.log('Connected to WebSocket');
          addMessage('received', `✓ 连接成功 (Socket ID: ${socket.id})`);
          updateStatus(true);
        });

        // 连接错误
        socket.on('connect_error', (error) => {
          console.error('Connection error:', error);
          addMessage('received', `✗ 连接失败: ${error.message}`);
          updateStatus(false);
        });

        // 断开连接
        socket.on('disconnect', (reason) => {
          console.log('Disconnected:', reason);
          addMessage('received', `○ 已断开: ${reason}`);
          updateStatus(false);
        });

        // 监听 speech_text 事件的响应 - 接收音频 buffer
        socket.on('speech_buffer', (data) => {
          console.log('Received speech buffer:', data);

          // 检查是否是音频 buffer 数据
          if (data && (data.type === 'Buffer' && Array.isArray(data.data))) {
            const text = data.text;

            // 查找对应的待处理消息
            let foundMessageId = null;
            for (const [msgId, msgText] of pendingMessages.entries()) {
              if (msgText === text) {
                foundMessageId = msgId;
                pendingMessages.delete(msgId);
                break;
              }
            }

            if (foundMessageId) {
              // 更新已存在的发送消息为音频播放器
              updateMessageToAudio(foundMessageId, data);
            } else {
              // 如果是接收到的音频（非自己发送的），添加新消息
              addMessage('received', '🎵 收到音频数据', true, data);
            }
          } else {
            // 普通消息
            addMessage('received', data);
          }
        });

        // 监听其他消息
        socket.on('message', (data) => {
          console.log('Received message:', data);
          addMessage('received', data);
        });
      }

      // 断开连接
      function disconnect() {
        if (socket) {
          socket.disconnect();
          socket = null;
          addMessage('received', '手动断开连接');
          updateStatus(false);
        }
      }

      // 发送消息
      function sendMessage() {
        const message = messageInput.value.trim();
        if (!message || !socket) return;

        // 生成消息 ID
        messageCounter++;
        const messageId = `msg_${messageCounter}_${Date.now()}`;

        // 添加到待处理列表
        pendingMessages.set(messageId, message);

        // 发送 speech_text 事件，包含文本内容和消息 ID
        socket.emit('speech_text', { text: message, messageId: messageId });

        // 显示加载状态
        addMessage('sent', '⏳ 正在转换语音...', false, null, messageId);

        messageInput.value = '';
      }

      // 清空日志
      function clearLog() {
        messageLog.innerHTML = '<div class="empty-state">等待消息...</div>';
      }

      // 事件监听
      connectBtn.addEventListener('click', connect);
      disconnectBtn.addEventListener('click', disconnect);
      sendBtn.addEventListener('click', sendMessage);
      clearBtn.addEventListener('click', clearLog);

      // 回车发送
      messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !sendBtn.disabled) {
          sendMessage();
        }
      });

      // 页面卸载时断开连接
      window.addEventListener('beforeunload', () => {
        if (socket) {
          socket.disconnect();
        }
      });
    </script>
  </body>
</html>
